name: Bro Health Check

on:
  schedule:
    - cron: '*/5 * * * *'  # 5分おき
  workflow_dispatch: {}     # 手動実行も可能

jobs:
  health-check:
    runs-on: ubuntu-latest  # GitHub-hosted（GCEと独立）
    steps:
      - name: Check Bro health endpoint
        id: bro
        run: |
          HTTP_CODE=$(curl -s -o /tmp/health-body -w '%{http_code}' \
            --connect-timeout 10 --max-time 20 \
            "http://34.61.96.154:3460/health" 2>/dev/null || echo "000")
          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Bro health: OK"
          else
            echo "❌ Bro health: HTTP $HTTP_CODE"
            BODY=$(cat /tmp/health-body 2>/dev/null || echo "(no response)")
            echo "body=$BODY" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Docker containers via SSH
        id: containers
        if: always()
        env:
          GCE_SSH_KEY: ${{ secrets.GCE_SSH_KEY }}
        run: |
          if [ -z "$GCE_SSH_KEY" ]; then
            echo "⏭️ GCE_SSH_KEY not set, skipping container check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$GCE_SSH_KEY" > ~/.ssh/gce_key
          chmod 600 ~/.ssh/gce_key

          RESULT=$(ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            -i ~/.ssh/gce_key yun@34.61.96.154 \
            "cd ~/github-runners && docker compose ps --format json" 2>/dev/null) || {
            echo "❌ SSH connection failed"
            echo "ssh_failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          }

          DEAD=""
          ALIVE=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            NAME=$(echo "$line" | jq -r '.Name // .Service // "unknown"')
            STATE=$(echo "$line" | jq -r '.State // "unknown"')
            if [ "$STATE" = "running" ]; then
              ALIVE="$ALIVE\n✅ $NAME"
            else
              DEAD="$DEAD\n❌ $NAME ($STATE)"
            fi
          done <<< "$RESULT"

          echo "dead<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$DEAD" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "alive<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$ALIVE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if [ -n "$DEAD" ]; then
            echo "has_dead=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Slack notification (failure)
        if: always() && (steps.bro.outputs.http_code != '200' || steps.containers.outputs.has_dead == 'true' || steps.containers.outputs.ssh_failed == 'true')
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          BRO_STATUS="${{ steps.bro.outputs.http_code }}"
          DEAD="${{ steps.containers.outputs.dead }}"
          SSH_FAILED="${{ steps.containers.outputs.ssh_failed }}"
          SKIP="${{ steps.containers.outputs.skip }}"

          MSG="🚨 Bro パイプライン障害検知\n\n"

          if [ "$BRO_STATUS" != "200" ]; then
            MSG+="❌ Bro /health — HTTP $BRO_STATUS\n"
          else
            MSG+="✅ Bro /health — OK\n"
          fi

          if [ "$SSH_FAILED" = "true" ]; then
            MSG+="❌ SSH接続失敗（VM自体がダウンの可能性）\n"
          elif [ "$SKIP" = "true" ]; then
            MSG+="⏭️ コンテナチェック: GCE_SSH_KEY未設定\n"
          elif [ -n "$DEAD" ]; then
            MSG+="$DEAD\n"
          fi

          MSG+="\n復旧: \`gcloud compute ssh bro-runners --project=neurometrics-484602 --zone=us-central1-a\`"

          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": $(echo -e "$MSG" | jq -Rs .)}"
